<svg width="680" height="780" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg">
<rect width="680" height="780" fill="#ffffff"/>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Startknoten -->
<circle cx="340" cy="40" r="16" fill="#333"/>

<!-- Hauptmenü -->
<rect x="220" y="80" width="240" height="52" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1"/>
<text x="340" y="101" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1a3a5c">Hauptmen&#252;</text>
<text x="340" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1a3a5c">Spiel starten / Beenden</text>
<line x1="340" y1="56" x2="340" y2="80" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Spiel wird initialisiert -->
<rect x="220" y="165" width="240" height="52" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
<text x="340" y="186" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1a3d1a">Spiel initialisieren</text>
<text x="340" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1a3d1a">Ball, Paddle, Bl&#246;cke laden</text>
<line x1="340" y1="132" x2="340" y2="165" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Game Loop -->
<rect x="220" y="250" width="240" height="52" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
<text x="340" y="271" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1a3d1a">Game Loop</text>
<text x="340" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#1a3d1a">Eingabe &#8594; Aktualisieren &#8594; Rendern</text>
<line x1="340" y1="217" x2="340" y2="250" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Raute: Ball verloren? -->
<polygon points="340,325 410,365 340,405 270,365" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
<text x="340" y="369" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#594f00">Ball verloren?</text>
<line x1="340" y1="302" x2="340" y2="325" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Ja → Leben verringern -->
<rect x="480" y="345" width="160" height="42" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
<text x="560" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#6b1a1a">Leben verringern</text>
<line x1="410" y1="365" x2="480" y2="365" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<text x="448" y="357" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#888">Ja</text>

<!-- Raute: Leben = 0? -->
<polygon points="560,415 620,450 560,485 500,450" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
<text x="560" y="454" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#594f00">Leben = 0?</text>
<line x1="560" y1="387" x2="560" y2="415" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Game Over -->
<rect x="490" y="520" width="140" height="46" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
<text x="560" y="547" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#6b1a1a">Game Over</text>
<line x1="560" y1="485" x2="560" y2="520" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<text x="572" y="508" font-family="Arial,sans-serif" font-size="11" fill="#888">Ja</text>

<!-- Nein von Leben=0 → zurück zum Loop -->
<text x="498" y="446" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#888">Nein</text>
<path d="M500 450 L100 450 L100 276 L220 276" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Nein von Ball verloren → Alle Blöcke? -->
<text x="268" y="415" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#888">Nein</text>

<!-- Raute: Alle Blöcke zerstört? -->
<polygon points="340,430 420,470 340,510 260,470" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
<text x="340" y="465" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#594f00">Alle Bl&#246;cke</text>
<text x="340" y="479" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#594f00">zerst&#246;rt?</text>
<line x1="340" y1="405" x2="340" y2="430" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Gewonnen -->
<rect x="150" y="540" width="150" height="46" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
<text x="225" y="567" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1a3d1a">Gewonnen!</text>
<line x1="260" y1="470" x2="225" y2="470" stroke="#555" stroke-width="1"/>
<line x1="225" y1="470" x2="225" y2="540" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<text x="244" y="464" font-family="Arial,sans-serif" font-size="11" fill="#888">Ja</text>

<!-- Nein von Alle Blöcke → zurück Loop -->
<text x="340" y="525" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#888">Nein</text>
<path d="M340 510 L340 600 L70 600 L70 276 L220 276" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Endknoten Gewonnen -->
<circle cx="225" cy="630" r="10" fill="none" stroke="#333" stroke-width="2"/>
<circle cx="225" cy="630" r="6" fill="#333"/>
<line x1="225" y1="586" x2="225" y2="620" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Endknoten Game Over -->
<circle cx="560" cy="630" r="10" fill="none" stroke="#333" stroke-width="2"/>
<circle cx="560" cy="630" r="6" fill="#333"/>
<line x1="560" y1="566" x2="560" y2="620" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Legende -->
<text x="340" y="710" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#333">Storm Breakout &#8211; Aktivit&#228;tsdiagramm</text>
</svg>
